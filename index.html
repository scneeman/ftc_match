<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kansas Missouri FTC Analytics</title>
    <style>
        /* Theme: Slate & Indigo / Font: Modern Sans-Serif */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 30px;
            background: #f8fafc;
            color: #1e293b;
        }
        h1 { color: #312e81; margin-bottom: 5px; }
        h2 { color: #64748b; font-weight: 400; font-size: 1.1rem; margin-top: 0; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;}
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        label { font-weight: 600; color: #475569; }

        select, button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            font-size: 14px;
            outline: none;
        }

        button {
            background: #4f46e5;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #4338ca; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .status { font-size: 13px; color: #6366f1; font-weight: 600; }

        /* Sortable Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { 
            background: #f8fafc; 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #64748b; 
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th:hover { background: #edf2f7; color: #312e81; }
        th.sort-asc::after { content: ' ↑'; position: absolute; right: 5px; }
        th.sort-desc::after { content: ' ↓'; position: absolute; right: 5px; }

        /* Match Analysis Expandable Tabs */
        details {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            background: white;
        }
        summary {
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            background: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        summary:hover { background: #e2e8f0; }

        .red-val { color: #be123c; font-weight: bold; }
        .blue-val { color: #1d4ed8; font-weight: bold; }
        .win-indicator { background: #dcfce7; border: 1px solid #10b981 !important; }
        .meet-rank-col { background: #fdf2f2; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Kansas Missouri FTC</h1>
    <h2>Regional Data & Performance Analysis</h2>

    <div class="card controls">
        <div>
            <label>Season:</label>
            <select id="yearSelect">
                <option value="">Select Year</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>
        <div>
            <label>Event:</label>
            <select id="eventSelect" disabled>
                <option value="">Select Event</option>
            </select>
        </div>
        <button id="analyzeBtn" disabled title="Requires match schedule to be released">Analyze All Matches</button>
        <button id="compareBtn" disabled>Compare All Teams</button>
        <div id="globalStatus" class="status">Select a season to begin.</div>
    </div>

    <div id="outputArea"></div>

<script>
    const API_BASE = "https://api.ftcscout.org/rest/v1";
    const region = "USMOKS";
    
    const yearSelect = document.getElementById('yearSelect');
    const eventSelect = document.getElementById('eventSelect');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const compareBtn = document.getElementById('compareBtn');
    const globalStatus = document.getElementById('globalStatus');
    const outputArea = document.getElementById('outputArea');

    let matches = [];
    let teams = []; // List of team numbers
    let statsCache = new Map();
    let comparisonData = [];
    let currentSort = { key: 'meetRankOverall', asc: true };

    // 1. Fetch Events
    yearSelect.onchange = async () => {
        const year = yearSelect.value;
        if (!year) return;
        eventSelect.disabled = true;
        globalStatus.textContent = "Fetching events...";
        try {
            const res = await fetch(`${API_BASE}/events/search/${year}?region=${region}`);
            const data = await res.json();
            data.sort((a, b) => a.name.localeCompare(b.name));
            eventSelect.innerHTML = '<option value="">Select Event</option>';
            data.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.code;
                opt.textContent = e.name;
                eventSelect.appendChild(opt);
            });
            eventSelect.disabled = false;
            globalStatus.textContent = "Events loaded.";
        } catch (e) { globalStatus.textContent = "Error loading events."; }
    };

    // 2. Load Event Teams & Matches (Now fetches teams independently of matches)
    eventSelect.onchange = async () => {
        const code = eventSelect.value;
        const year = yearSelect.value;
        if (!code) return;
        
        globalStatus.textContent = "Fetching event details...";
        analyzeBtn.disabled = true;
        compareBtn.disabled = true;
        outputArea.innerHTML = "";

        try {
            // Fetch teams and matches in parallel
            const [teamRes, matchRes] = await Promise.all([
                fetch(`${API_BASE}/events/${year}/${code}/teams`),
                fetch(`${API_BASE}/events/${year}/${code}/matches`)
            ]);
            
            const eventTeams = await teamRes.json();
            matches = await matchRes.json();
            
            // Extract team numbers
            teams = eventTeams.map(t => t.number || t.teamNumber).sort((a,b) => a - b);

            // Enable Compare button if there are teams (even if 0 matches)
            compareBtn.disabled = teams.length === 0;
            
            // Enable Analyze button only if match schedule exists
            analyzeBtn.disabled = matches.length === 0;

            globalStatus.textContent = `Ready: ${teams.length} teams found. ${matches.length > 0 ? matches.length + " matches found." : "Match schedule not yet available."}`;
        } catch (e) { 
            globalStatus.textContent = "Error loading event data."; 
            console.error(e);
        }
    };

    async function prefetchData() {
        const year = yearSelect.value;
        const missing = teams.filter(t => !statsCache.has(t));
        if (missing.length === 0) return;

        for (let i = 0; i < missing.length; i += 5) {
            const chunk = missing.slice(i, i + 5);
            await Promise.all(chunk.map(async (num) => {
                try {
                    const [qRes, tRes] = await Promise.all([
                        fetch(`${API_BASE}/teams/${num}/quick-stats?season=${year}`),
                        fetch(`${API_BASE}/teams/${num}`)
                    ]);
                    statsCache.set(num, { stats: await qRes.json(), info: await tRes.json() });
                } catch (e) { console.error(`Failed to fetch team ${num}`, e); }
            }));
            globalStatus.textContent = `Gathering data: ${Math.min(i+5, missing.length)} / ${missing.length}...`;
        }
    }

    // 3a. Analyze All Matches
    analyzeBtn.onclick = async () => {
        outputArea.innerHTML = "<div class='card'><h3>Match Projections</h3><div id='list'></div></div>";
        const list = document.getElementById('list');
        await prefetchData();

        let count = 0;
        matches.forEach(m => {
            const teamData = m.teams || [];
            const red = teamData.filter(t => t.alliance?.toLowerCase() === 'red').map(t => t.teamNumber);
            const blue = teamData.filter(t => t.alliance?.toLowerCase() === 'blue').map(t => t.teamNumber);

            if (red.length === 0 && blue.length === 0) return;

            const sum = (nums) => {
                let d = { tot: 0, auto: 0, dc: 0, eg: 0 };
                nums.forEach(n => {
                    const s = statsCache.get(n)?.stats;
                    if (s) {
                        d.tot += s.tot?.value || 0; d.auto += s.auto?.value || 0;
                        d.dc += s.dc?.value || 0; d.eg += s.eg?.value || 0;
                    }
                });
                return d;
            };

            const rS = sum(red); const bS = sum(blue);
            const label = (n) => `<b>${n} (${statsCache.get(n)?.info.name || '???'})</b>`;

            const det = document.createElement('details');
            det.innerHTML = `<summary><span>Match #${m.id || count + 1}</span><span><span class="red-val">${red.join(' & ')}</span> vs <span class="blue-val">${blue.join(' & ')}</span></span><span>${rS.tot.toFixed(0)} - ${bS.tot.toFixed(0)}</span></summary>
                <div style="padding:15px">
                    <p style="font-size:13px"><b>Red:</b> ${red.map(label).join(', ')}</p><p style="font-size:13px"><b>Blue:</b> ${blue.map(label).join(', ')}</p>
                    <table><thead><tr><th>Metric</th><th>Red Alliance</th><th>Blue Alliance</th></tr></thead>
                    <tbody>
                        <tr><td>Total Score</td><td class="${rS.tot > bS.tot ? 'win-indicator' : ''}">${rS.tot.toFixed(1)}</td><td class="${bS.tot > rS.tot ? 'win-indicator' : ''}">${bS.tot.toFixed(1)}</td></tr>
                        <tr><td>Autonomous</td><td>${rS.auto.toFixed(1)}</td><td>${bS.auto.toFixed(1)}</td></tr>
                        <tr><td>Tele-Op (DC)</td><td>${rS.dc.toFixed(1)}</td><td>${bS.dc.toFixed(1)}</td></tr>
                        <tr><td>Endgame</td><td>${rS.eg.toFixed(1)}</td><td>${bS.eg.toFixed(1)}</td></tr>
                    </tbody></table></div>`;
            list.appendChild(det);
            count++;
        });
        globalStatus.textContent = `Analysis complete for ${count} matches.`;
    };

    // 3b. Compare All Teams (Logic from compare_teams_at_meet.py)
    compareBtn.onclick = async () => {
        outputArea.innerHTML = "<div class='card'><h3>Team Comparison Table</h3><div id='tableArea'></div></div>";
        await prefetchData();

        let raw = teams.map(n => {
            const d = statsCache.get(n);
            return {
                num: n, 
                name: d?.info.name || '?', 
                city: d?.info.city || '?',
                worldRank: d?.stats.tot?.rank || 999999,
                worldAuto: d?.stats.auto?.rank || 999999,
                worldDC: d?.stats.dc?.rank || 999999,
                valTot: d?.stats.tot?.value || 0,
                valAuto: d?.stats.auto?.value || 0,
                valDC: d?.stats.dc?.value || 0
            };
        });

        // Calculate Relative Meet Ranks based on World Performance (as per python logic)
        const sortBy = (arr, key) => [...arr].sort((a, b) => a[key] - b[key]);
        const overallSorted = sortBy(raw, 'worldRank');
        const autoSorted = sortBy(raw, 'worldAuto');
        const dcSorted = sortBy(raw, 'worldDC');

        comparisonData = raw.map(t => ({
            ...t,
            meetRankOverall: overallSorted.indexOf(overallSorted.find(x => x.num === t.num)) + 1,
            meetRankAuto: autoSorted.indexOf(autoSorted.find(x => x.num === t.num)) + 1,
            meetRankDC: dcSorted.indexOf(dcSorted.find(x => x.num === t.num)) + 1
        }));

        renderComparisonTable();
        globalStatus.textContent = "Meet rankings generated (Sortable).";
    };

    function renderComparisonTable() {
        comparisonData.sort((a, b) => {
            let va = a[currentSort.key];
            let vb = b[currentSort.key];
            if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
            if (va < vb) return currentSort.asc ? -1 : 1;
            if (va > vb) return currentSort.asc ? 1 : -1;
            return 0;
        });

        const cols = [
            { label: 'Meet Rank', key: 'meetRankOverall' },
            { label: 'Meet Auto', key: 'meetRankAuto' },
            { label: 'Meet DC', key: 'meetRankDC' },
            { label: 'Team #', key: 'num' },
            { label: 'Name', key: 'name' },
            { label: 'City', key: 'city' },
            { label: 'World Rank', key: 'worldRank' },
            { label: 'World Auto', key: 'worldAuto' },
            { label: 'World DC', key: 'worldDC' }
        ];

        let html = `<table><thead><tr>`;
        cols.forEach(col => {
            const cls = currentSort.key === col.key ? (currentSort.asc ? 'sort-asc' : 'sort-desc') : '';
            html += `<th onclick="handleSort('${col.key}')" class="${cls}">${col.label}</th>`;
        });
        html += `</tr></thead><tbody>`;
        
        comparisonData.forEach(r => {
            html += `<tr>
                <td class="meet-rank-col">${r.meetRankOverall}</td>
                <td>${r.meetRankAuto}</td>
                <td>${r.meetRankDC}</td>
                <td><b>${r.num}</b></td>
                <td>${r.name}</td>
                <td>${r.city}</td>
                <td>${r.worldRank}</td>
                <td>${r.worldAuto}</td>
                <td>${r.worldDC}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('tableArea').innerHTML = html;
    }

    window.handleSort = (key) => {
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = true; }
        renderComparisonTable();
    };
</script>
</body>
</html>
